<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles Wood</title>
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
    <!-- Github pages takes https and not http, so you have to change the URL -->
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Recursive' rel='stylesheet'>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="main-menu">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="mr-auto"></div>
                <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href={{ site.url }}>HOME<span class="sr-only">(current)</span></a>
                </li>
		<li class="nav-item">
                    <a class="nav-link" href={{ site.url | append: "/blogs.html"}}>BACK TO BLOGS</a>
                </li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Blog -->
    <section class="blog" id="blog">
        <div class="container">
          <div class="blog-heading">
            <h1>{{ page.title }}</h1>
	    <h6>Published: <time>{{page.date | date: '%F'}}</time></h6>
          </div>
          <div class="blog-details">
            {{ content }}
          </div>
        </div>
    </section>

    <footer>
        <a class="btn-rss" href="/feed.xml" target="_blank">RSS Feed</a>
        <p>&copy; 2021 Charles Wood</p>
    </footer>

    <!-- js imports -->
    <script src="/js/jquery.3.5.1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/typed.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/cferdinandi/smooth-scroll/dist/smooth-scroll.polyfills.min.js"></script>
    <script src="/js/typed.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
