<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles Wood</title>
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
    <!-- Github pages takes https and not http, so you have to change the URL -->
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Recursive' rel='stylesheet'>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="main-menu">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="mr-auto"></div>
                <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href={{ site.url }}>HOME<span class="sr-only">(current)</span></a>
                </li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Blogs -->
    <section class="blogs" id="blogs">
        <div class="container">
          <div class="section-heading">
            <h1>Blogs</h1>
	    <ul>
	      {% for post in site.posts %}
	      <li class="date">
		<h2>
		  <a href="{{ post.url }}">
		  {{ post.title }}
		  </a>
		- <time datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date_to_long_string }}</time>
		</h2>
	      </li>
	      {% endfor %}
	    </ul>
          </div>
        </div>
    </section>

    <footer>
        <a class="btn btn-rss" href="/feed.xml" target="_blank">RSS Feed</a>
        <p>&copy; 2021 Charles Wood</p>
    </footer>
</body>
</html>
